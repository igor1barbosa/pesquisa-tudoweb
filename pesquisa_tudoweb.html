<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesquisa de Satisfação - TudoWeb</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
    }

    .progress-bg {
      background: #e9e9e9;
      border-radius: 6px;
      height: 8px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #2e9e60;
      border-radius: 6px;
      transition: width 0.4s ease;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #2e9e60; }

    .opinion-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 4px;
    }

    /* Estado padrão dos botões */
    .opinion-btn {
      padding: 14px 6px;
      border-radius: 8px;
      border: 2px solid #ccc;
      background: #fff;
      font-size: 14px;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .opinion-btn:hover {
      border-color: #999;
    }

    /* Verde - Excelente */
    .opinion-btn.ativo-excelente {
      background: #d4edda;
      border-color: #28a745;
      color: #155724;
    }

    /* Amarelo - Bom */
    .opinion-btn.ativo-bom {
      background: #fff3cd;
      border-color: #ffc107;
      color: #856404;
    }

    /* Vermelho - Ruim */
    .opinion-btn.ativo-ruim {
      background: #f8d7da;
      border-color: #dc3545;
      color: #721c24;
    }

    .error-msg {
      font-size: 12px;
      color: #dc3545;
      margin-top: 4px;
      display: none;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: #2e9e60;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .submit-btn:hover { background: #257a4a; }

    /* Tela de resultados */
    #tela-resultado { display: none; }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .metric-card {
      background: #f4f4f4;
      border-radius: 8px;
      padding: 14px 10px;
      text-align: center;
    }

    .metric-label { font-size: 12px; color: #666; margin-bottom: 4px; }

    .metric-value { font-size: 28px; font-weight: 700; }

    .v-excelente { color: #28a745; }
    .v-bom       { color: #e0a800; }
    .v-ruim      { color: #dc3545; }

    .bar-row { margin-bottom: 12px; }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .bar-bg {
      background: #e9e9e9;
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.6s ease;
    }

    .history-title { font-size: 13px; color: #666; margin: 16px 0 6px; }

    .history-list {
      max-height: 180px;
      overflow-y: auto;
      border-top: 1px solid #eee;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
      color: #444;
    }

    .badge {
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-e { background: #d4edda; color: #155724; }
    .badge-b { background: #fff3cd; color: #856404; }
    .badge-r { background: #f8d7da; color: #721c24; }

    .reset-btn {
      margin-top: 16px;
      font-size: 13px;
      color: #555;
      background: none;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
    }

    .reset-btn:hover { background: #f4f4f4; }
  </style>
</head>
<body>

<div class="card">

  <!-- TELA DE FORMULÁRIO -->
  <div id="tela-form">
    <h1>Pesquisa de Satisfação</h1>
    <p class="subtitle" id="contador">Entrevistado <strong>1</strong> de 50</p>

    <div class="progress-bg">
      <div class="progress-fill" id="barra" style="width: 2%;"></div>
    </div>

    <div class="field">
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Nome do entrevistado" />
      <div class="error-msg" id="err-nome">Informe o nome.</div>
    </div>

    <div class="field">
      <label for="idade">Idade</label>
      <input type="number" id="idade" placeholder="Ex: 34" min="1" max="120" />
      <div class="error-msg" id="err-idade">Informe uma idade válida (1 a 120).</div>
    </div>

    <div class="field">
      <label>Opinião sobre o atendimento</label>
      <div class="opinion-grid">
        <button class="opinion-btn" id="btn-excelente" onclick="selecionarOpiniao(1)">Excelente</button>
        <button class="opinion-btn" id="btn-bom"       onclick="selecionarOpiniao(2)">Bom</button>
        <button class="opinion-btn" id="btn-ruim"      onclick="selecionarOpiniao(3)">Ruim</button>
      </div>
      <div class="error-msg" id="err-opiniao">Selecione uma opção.</div>
    </div>

    <button class="submit-btn" onclick="registrar()">Registrar resposta</button>
  </div>

  <!-- TELA DE RESULTADO -->
  <div id="tela-resultado">
    <h1 style="margin-bottom: 16px;">Resultado Final</h1>

    <div class="metric-grid">
      <div class="metric-card">
        <div class="metric-label">Excelente</div>
        <div class="metric-value v-excelente" id="r-excelente">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Bom</div>
        <div class="metric-value v-bom" id="r-bom">0</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Ruim</div>
        <div class="metric-value v-ruim" id="r-ruim">0</div>
      </div>
    </div>

    <div class="bar-row">
      <div class="bar-label">
        <span style="color:#155724;">Excelente</span>
        <span id="pct-e">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar-e" style="width:0%; background:#28a745;"></div></div>
    </div>

    <div class="bar-row">
      <div class="bar-label">
        <span style="color:#856404;">Bom</span>
        <span id="pct-b">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar-b" style="width:0%; background:#ffc107;"></div></div>
    </div>

    <div class="bar-row">
      <div class="bar-label">
        <span style="color:#721c24;">Ruim</span>
        <span id="pct-r">0%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="bar-r" style="width:0%; background:#dc3545;"></div></div>
    </div>

    <p class="history-title">Histórico de respostas</p>
    <div class="history-list" id="historico"></div>

    <button class="reset-btn" onclick="reiniciar()">Refazer pesquisa</button>
  </div>

</div>

<script>
  let atual = 1;
  let opiniaoSelecionada = 0;
  let contagem = { 1: 0, 2: 0, 3: 0 };
  let historico = [];

  function selecionarOpiniao(n) {
    opiniaoSelecionada = n;

    document.getElementById('btn-excelente').className = 'opinion-btn';
    document.getElementById('btn-bom').className       = 'opinion-btn';
    document.getElementById('btn-ruim').className      = 'opinion-btn';

    if (n === 1) document.getElementById('btn-excelente').className = 'opinion-btn ativo-excelente';
    if (n === 2) document.getElementById('btn-bom').className       = 'opinion-btn ativo-bom';
    if (n === 3) document.getElementById('btn-ruim').className      = 'opinion-btn ativo-ruim';

    document.getElementById('err-opiniao').style.display = 'none';
  }

  function validar() {
    let ok = true;
    const nome = document.getElementById('nome').value.trim();
    const idade = parseInt(document.getElementById('idade').value);

    document.getElementById('err-nome').style.display = nome ? 'none' : 'block';
    if (!nome) ok = false;

    const idadeOk = !isNaN(idade) && idade >= 1 && idade <= 120;
    document.getElementById('err-idade').style.display = idadeOk ? 'none' : 'block';
    if (!idadeOk) ok = false;

    document.getElementById('err-opiniao').style.display = opiniaoSelecionada ? 'none' : 'block';
    if (!opiniaoSelecionada) ok = false;

    return ok;
  }

  function registrar() {
    if (!validar()) return;

    const nome = document.getElementById('nome').value.trim();
    const idade = document.getElementById('idade').value;

    contagem[opiniaoSelecionada]++;
    historico.push({ nome, idade, opiniao: opiniaoSelecionada });

    if (atual < 50) {
      atual++;
      document.getElementById('contador').innerHTML = 'Entrevistado <strong>' + atual + '</strong> de 50';
      document.getElementById('barra').style.width = (atual / 50 * 100) + '%';
      document.getElementById('nome').value = '';
      document.getElementById('idade').value = '';
      opiniaoSelecionada = 0;
      document.getElementById('btn-excelente').className = 'opinion-btn';
      document.getElementById('btn-bom').className       = 'opinion-btn';
      document.getElementById('btn-ruim').className      = 'opinion-btn';
      document.getElementById('nome').focus();
    } else {
      mostrarResultado();
    }
  }

  function mostrarResultado() {
    document.getElementById('tela-form').style.display = 'none';
    document.getElementById('tela-resultado').style.display = 'block';

    document.getElementById('r-excelente').textContent = contagem[1];
    document.getElementById('r-bom').textContent       = contagem[2];
    document.getElementById('r-ruim').textContent      = contagem[3];

    const pctE = Math.round(contagem[1] / 50 * 100);
    const pctB = Math.round(contagem[2] / 50 * 100);
    const pctR = Math.round(contagem[3] / 50 * 100);

    setTimeout(() => {
      document.getElementById('bar-e').style.width = pctE + '%';
      document.getElementById('bar-b').style.width = pctB + '%';
      document.getElementById('bar-r').style.width = pctR + '%';
      document.getElementById('pct-e').textContent = pctE + '%';
      document.getElementById('pct-b').textContent = pctB + '%';
      document.getElementById('pct-r').textContent = pctR + '%';
    }, 80);

    const labels = { 1: 'Excelente', 2: 'Bom', 3: 'Ruim' };
    const badgeClass = { 1: 'badge-e', 2: 'badge-b', 3: 'badge-r' };

    document.getElementById('historico').innerHTML = historico.map(h =>
      `<div class="history-item">
        <span>${h.nome}, ${h.idade} anos</span>
        <span class="badge ${badgeClass[h.opiniao]}">${labels[h.opiniao]}</span>
      </div>`
    ).join('');
  }

  function reiniciar() {
    atual = 1;
    opiniaoSelecionada = 0;
    contagem = { 1: 0, 2: 0, 3: 0 };
    historico = [];
    document.getElementById('tela-form').style.display = 'block';
    document.getElementById('tela-resultado').style.display = 'none';
    document.getElementById('contador').innerHTML = 'Entrevistado <strong>1</strong> de 50';
    document.getElementById('barra').style.width = '2%';
    document.getElementById('nome').value = '';
    document.getElementById('idade').value = '';
    document.getElementById('btn-excelente').className = 'opinion-btn';
    document.getElementById('btn-bom').className       = 'opinion-btn';
    document.getElementById('btn-ruim').className      = 'opinion-btn';
  }
</script>

</body>
</html>
